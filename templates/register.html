<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - HRVision</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f8fafc;">

    <div class="card" style="width: 100%; max-width: 400px; padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2 style="color: var(--primary-color);">HRVision AI</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Create a candidate account</p>
        </div>

        <form action="/register" method="POST" style="display: flex; flex-direction: column; gap: 1rem;">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="john@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <div style="position: relative; display: flex; align-items: center;">
                    <input type="password" name="password" id="regPassword" required placeholder="••••••••" style="padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 6px; width: 100%; padding-right: 2.5rem;">
                    <button type="button" onclick="togglePassword('regPassword', 'regEye')" style="position: absolute; right: 0.75rem; background: none; border: none; cursor: pointer; color: var(--text-muted); display: flex; padding: 0;">
                        <svg id="regEye" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Sign Up</button>
        </form>

        <p style="text-align: center; margin-top: 2rem; font-size: 0.9rem;">
            Already have an account? <a href="/login" style="color: var(--primary-color); text-decoration: none; font-weight: 600;">Log In</a>
        </p>

        <div style="text-align: center; margin-top: 1.5rem;">
            <a href="/" style="color: var(--text-muted); font-size: 0.85rem; text-decoration: none;">← Back to Home</a>
        </div>
    </div>

    <script>
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                input.type = 'password';
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        }
    </script>
</body>
</html>
