<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Password - HRVision</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/favicon-96x96.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f8fafc;">

    <div class="card" style="width: 100%; max-width: 400px; padding: 2.5rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2 style="color: var(--primary-color);">HRVision AI</h2>
            <p style="color: var(--text-muted); margin-top: 0.5rem;">Create your new password</p>
        </div>

        <form method="POST" style="display: flex; flex-direction: column; gap: 1rem;">
            <div class="form-group">
                <label>New Password</label>
                <div style="position: relative; display: flex; align-items: center;">
                    <input type="password" name="new_password" id="new_password" required placeholder="••••••••" style="padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 6px; width: 100%; padding-right: 40px; box-sizing: border-box;">
                    <svg id="eye_new" onclick="togglePassword('new_password', 'eye_new')" style="position: absolute; right: 10px; cursor: pointer; width: 20px; height: 20px; color: #6b7280;" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                    </svg>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="padding: 0.75rem; border-radius: 6px; font-weight: 600;">Reset Password</button>
        </form>
    </div>

    <script>
        // --- Password Visibility Toggle Logic ---
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === "password") {
                input.type = "text";
                // Swap to 'Closed Eye' (Eye Slash) SVG
                icon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>
                `;
                icon.style.color = "var(--primary-color)"; // Highlight icon when password is shown
            } else {
                input.type = "password";
                // Swap back to 'Open Eye' SVG
                icon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                `;
                icon.style.color = "#6b7280"; // Revert to gray
            }
        }
    </script>
</body>
</html>
